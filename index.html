<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月尘写表器</title>

  <script>
    (function () {
      // 1. 判定是否在中国大陆 (UTC+8)
      var isChina = new Date().getTimezoneOffset() === -480;

      // 2. 动态加载字体
      var fontDomain = isChina ? 'fonts.geekzu.org' : 'fonts.googleapis.com';
      var fontFamilies = [
        'Orbitron:wght@400;500;700',
        'Noto+Sans+SC:wght@400;500;700',
        'Kosugi+Maru'
      ];

      fontFamilies.forEach(function (family) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://' + fontDomain + '/css2?family=' + family + '&display=swap';
        document.head.appendChild(link);
      });

      // 3. 动态加载 Google Analytics (仅限非中国地区)
      if (!isChina) {
        var gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-C20B5DP4NF';
        document.head.appendChild(gaScript);

        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-C20B5DP4NF');
        console.log("🌐 境外模式：已激活 Google Analytics");
      } else {
        var _hmt = _hmt || [];
        (function () {
          var hm = document.createElement("script");
          hm.src = "https://hm.baidu.com/hm.js?f8fe7a809a811fc54a1b6acf3cd2d608";
          var s = document.getElementsByTagName("script")[0];
          s.parentNode.insertBefore(hm, s);
        })();
        console.log("🚀 境内模式：已跳过 GA，改用极速字体镜像");
      }
    })();
  </script>


  <script type="module" crossorigin src="/builder-web/assets/index.BeeMl-8U.js"></script>
  <link rel="stylesheet" crossorigin href="/builder-web/assets/index.CbFUYE8R.css">
</head>

<body>
  <div id="root"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((reg) => {
          reg.unregister().then(() => {
            if (regs.length > 0) location.reload(true);
          });
        });
      });
    }
  </script>
</body>

</html>
